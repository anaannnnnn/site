<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — VideoVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #000000;
      --color-card: #0c0c0d;
      --color-muted: #181818;
      --color-border: rgba(255,255,255,0.08);
      --color-accent: #e11d48;
      --color-accent-hover: #be123c;
      --color-text: #f8fafc;
      --color-text-muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body { background: var(--color-bg); color: var(--color-text); font-family: 'Inter', sans-serif; }
    .card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
    }
    .related-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      cursor: pointer;
      transition: border-color 200ms, box-shadow 200ms;
    }
    .related-card:hover {
      border-color: var(--color-accent);
      box-shadow: 0 4px 16px rgba(225,29,72,0.12);
    }
    .skeleton {
      background: linear-gradient(90deg, #181818 25%, #242424 50%, #181818 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .btn-save {
      background: var(--color-accent);
      transition: background 150ms, transform 100ms;
    }
    .btn-save:hover { background: var(--color-accent-hover); }
    .btn-save:active { transform: scale(0.97); }
    .btn-back {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--color-border);
      transition: background 150ms;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); }
    #player { background: #000; width: 100%; height: 100%; }
  </style>
</head>
<body>

<nav class="sticky top-0 z-50 border-b px-4 py-3" style="background: rgba(0,0,0,0.92); backdrop-filter: blur(16px); border-color: var(--color-border);">
  <div class="max-w-6xl mx-auto flex items-center justify-between">
    <a href="index.html" class="btn-back flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold text-white">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <div class="flex items-center gap-2">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-rose-500" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span class="text-sm font-bold">VideoVault</span>
    </div>
    <a href="downloads.html" class="btn-back flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold" style="color: var(--color-accent);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
      Library
    </a>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
  <div class="lg:col-span-3 space-y-4">
    <div class="card rounded-2xl overflow-hidden aspect-video relative">
      <video id="player" controls crossorigin="anonymous" autoplay></video>
    </div>

    <div class="card p-5 rounded-2xl">
      <div id="titleSkeleton" class="space-y-2">
        <div class="skeleton h-5 w-3/4 rounded"></div>
        <div class="skeleton h-3 w-1/3 rounded"></div>
      </div>
      <div id="titleBlock" class="hidden">
        <h1 id="title" class="text-lg font-bold leading-snug"></h1>
        <p id="meta" class="text-xs mt-1.5" style="color: var(--color-text-muted);"></p>
      </div>
    </div>

    <div class="flex gap-3">
      <button id="btnSave" class="btn-save flex items-center gap-2 px-6 py-3 rounded-xl text-xs font-bold uppercase tracking-wide text-white" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save to Library
      </button>
      <div id="savedBadge" class="hidden items-center gap-1.5 px-4 py-3 rounded-xl text-xs font-semibold text-emerald-400" style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Saved
      </div>
    </div>
  </div>

  <aside>
    <h2 class="text-xs font-bold uppercase tracking-widest mb-4" style="color: var(--color-text-muted);">Related</h2>
    <div id="related" class="space-y-3">
      </div>
  </aside>
</main>

<script>
const urlParams = new URLSearchParams(location.search);
const id = urlParams.get("id");
const directUrl = urlParams.get("url");

// CORS Proxy for streaming media
const STREAM_PROXIES = [
  (url) => `https://videoproxy.moananayoob.workers.dev?url=${encodeURIComponent(url)}`,
  (url) => `https://universal.moananayoob.workers.dev?url=${encodeURIComponent(url)}`
];

async function fetchWithProxy(url) {
  let lastError = new Error("All proxies failed");
  for (let i = 0; i < STREAM_PROXIES.length; i++) {
    try {
      const res = await fetch(STREAM_PROXIES[i](url), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res;
    } catch (e) {
      lastError = e;
    }
  }
  throw lastError;
}

// Direct eporner API calls (handles via CORS proxy)
const EPORNER_API = 'https://www.eporner.com/api/v2';
const API_PROXY_URL = 'https://videoproxy.moananayoob.workers.dev';

async function epornerAPI(endpoint, params = {}) {
  const url = new URL(`${EPORNER_API}${endpoint}`);
  url.searchParams.set('format', 'json');
  Object.entries(params).forEach(([key, value]) => {
    if (value !== undefined && value !== null) {
      url.searchParams.set(key, value);
    }
  });

  try {
    const proxyUrl = `${API_PROXY_URL}?url=${encodeURIComponent(url.toString())}`;
    console.log('Fetching:', proxyUrl);
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    console.log('API Response:', data);
    return data;
  } catch (e) {
    console.error('API Error:', e);
    throw e;
  }
}

let videoData = null;

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSkeletons() {
  document.getElementById('related').innerHTML = Array(4).fill(0).map(() => `
    <div class="card rounded-xl overflow-hidden flex gap-3 p-2">
      <div class="skeleton rounded-lg flex-shrink-0" style="width:80px;height:52px;"></div>
      <div class="flex-1 space-y-1.5 py-1">
        <div class="skeleton h-2.5 w-full rounded"></div>
        <div class="skeleton h-2.5 w-2/3 rounded"></div>
      </div>
    </div>`).join('');
}

async function load() {
  renderSkeletons();

  if (!id && !directUrl) {
    document.getElementById('title').textContent = "No context or URL parsed";
    document.getElementById('titleSkeleton').classList.add('hidden');
    document.getElementById('titleBlock').classList.remove('hidden');
    return;
  }

  // Handle explicit URL streaming targets (RSS layouts)
  if (directUrl) {
    videoData = {
      id: "rss-" + btoa(directUrl).substring(0, 10),
      title: "External Video Stream",
      embed: directUrl,
      default_thumb: "",
      length_min: ""
    };
    
    document.getElementById('player').src = STREAM_PROXIES[0](directUrl);
    document.getElementById('title').textContent = videoData.title;
    document.getElementById('meta').textContent = "Direct Stream Link";
    document.getElementById('titleSkeleton').classList.add('hidden');
    document.getElementById('titleBlock').classList.remove('hidden');
    document.getElementById('btnSave').disabled = false;
    loadRelated("trending");
    return;
  }

  // Handle standard JSON payload processing
  try {
    console.log('Loading video:', id);
    videoData = await epornerAPI('/video/id/', { id, thumbsize: 'big' });
    console.log('Video data:', videoData);

    if (!videoData || !videoData.title) {
      throw new Error('Invalid video data: ' + JSON.stringify(videoData));
    }

    // Route direct asset formats into the proxy architecture safely
    const rawAssetUrl = videoData.embed || videoData.url;
    if (!rawAssetUrl) {
      throw new Error('No video URL found in response');
    }

    document.getElementById('player').src = STREAM_PROXIES[0](rawAssetUrl);

    document.getElementById('title').textContent = videoData.title;
    document.getElementById('meta').textContent = [
      videoData.length_min ? `${videoData.length_min} min` : '',
      videoData.views ? `${Number(videoData.views).toLocaleString()} views` : '',
      videoData.added ? new Date(videoData.added * 1000).toLocaleDateString() : ''
    ].filter(Boolean).join(' · ');

    document.getElementById('titleSkeleton').classList.add('hidden');
    document.getElementById('titleBlock').classList.remove('hidden');
    document.getElementById('btnSave').disabled = false;

    loadRelated(videoData.keywords);
  } catch (e) {
    console.error('Failed to load video:', e.message, e);
    document.getElementById('titleSkeleton').classList.add('hidden');
    document.getElementById('titleBlock').classList.remove('hidden');
    document.getElementById('title').textContent = "Failed to load video";
    document.getElementById('meta').textContent = "Error: " + e.message;
    document.getElementById('related').innerHTML = '';
  }
}

async function loadRelated(keywords) {
  const query = (keywords || "trending").split(",")[0].trim();
  try {
    const data = await epornerAPI('/video/search/', { query, per_page: 8 });
    const videos = (data.videos || []).filter(v => v.id !== id).slice(0, 6);
    document.getElementById('related').innerHTML = videos.map(v => `
      <div class="related-card rounded-xl overflow-hidden flex gap-3 p-2" onclick="location.href='video.html?id=${v.id}'">
        <div class="flex-shrink-0 rounded-lg overflow-hidden" style="width:88px;height:56px;background:var(--color-muted);">
          <img src="${v.default_thumb?.src || v.default_thumb}" alt="" class="w-full h-full object-cover" loading="lazy">
        </div>
        <div class="flex-1 min-w-0 py-0.5">
          <p class="text-[10px] font-semibold leading-snug line-clamp-3" style="color:var(--color-text);">${escapeHtml(v.title)}</p>
          ${v.length_min ? `<p class="text-[9px] mt-1" style="color:var(--color-text-muted);">${v.length_min} min</p>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('related').innerHTML = '';
  }
}

document.getElementById('btnSave').onclick = async () => {
  if (!videoData) return;
  try {
    const db = await new Promise((res, rej) => {
      const req = indexedDB.open("VideoVault", 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore("downloads", { keyPath: "id" });
      req.onsuccess = e => res(e.target.result);
      req.onerror = rej;
    });
    const tx = db.transaction("downloads", "readwrite");
    tx.objectStore("downloads").put({
      id: id || videoData.id,
      title: videoData.title,
      thumb: videoData.default_thumb?.src || videoData.default_thumb || "",
      duration: videoData.length_min || "",
      createdAt: Date.now()
    });
    document.getElementById('btnSave').classList.add('hidden');
    document.getElementById('savedBadge').classList.remove('hidden');
    document.getElementById('savedBadge').classList.add('flex');
  } catch(e) {
    alert("Failed to save asset registry context locally.");
  }
};

load();
</script>
</body>
</html>
