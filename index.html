
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #000000;
      --color-card: #0c0c0d;
      --color-muted: #181818;
      --color-border: rgba(255,255,255,0.08);
      --color-accent: #e11d48;
      --color-accent-hover: #be123c;
      --color-text: #f8fafc;
      --color-text-muted: #94a3b8;
      --color-primary: #0f0f23;
      --color-secondary: #1e1b4b;
    }
    * { box-sizing: border-box; }
    body { background: var(--color-bg); color: var(--color-text); font-family: 'Inter', sans-serif; }
    .card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      transition: border-color 200ms ease, transform 200ms ease, box-shadow 200ms ease;
      cursor: pointer;
    }
    .card:hover {
      border-color: var(--color-accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(225,29,72,0.15);
    }
    .pill {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--color-border);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 150ms, border-color 150ms, color 150ms;
      color: var(--color-text-muted);
    }
    .pill:hover { background: rgba(255,255,255,0.12); color: var(--color-text); }
    .pill.active { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .skeleton {
      background: linear-gradient(90deg, #181818 25%, #242424 50%, #181818 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .src-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 3px 7px;
      border-radius: 4px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .search-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--color-border);
      transition: border-color 150ms;
    }
    .search-input:focus { border-color: var(--color-accent); outline: none; }
    .btn-primary {
      background: var(--color-accent);
      transition: background 150ms;
    }
    .btn-primary:hover { background: var(--color-accent-hover); }
    .logo-glow { text-shadow: 0 0 20px rgba(225,29,72,0.5); }
  </style>
</head>
<body>

<header class="sticky top-0 z-50 border-b" style="background: rgba(0,0,0,0.92); backdrop-filter: blur(16px); border-color: var(--color-border);">
  <div class="max-w-7xl mx-auto px-4 py-3 space-y-3">
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-2">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="text-rose-500" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span class="text-base font-bold tracking-tight logo-glow">VideoVault</span>
      </div>
      <a href="downloads.html" class="flex items-center gap-1.5 text-[11px] font-semibold uppercase tracking-wide" style="color: var(--color-accent);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Library
      </a>
    </div>
    <div class="flex gap-2">
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--color-text-muted);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="q" type="text" placeholder="Search videos..." class="search-input w-full pl-10 pr-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-500">
      </div>
      <select id="actorSelect" class="search-input rounded-xl px-3 text-[11px] font-medium text-white min-w-[90px]">
        <option value="">All</option>
        <option value="Mia">Mia</option>
        <option value="Lana">Lana</option>
        <option value="Riley">Riley</option>
      </select>
      <button onclick="doSearch()" class="btn-primary px-5 rounded-xl text-[11px] font-bold uppercase tracking-wide text-white">Search</button>
    </div>
    <div id="catRow" class="flex gap-2 overflow-x-auto no-scrollbar pb-0.5"></div>
  </div>
</header>

<div id="statusBar" class="hidden max-w-7xl mx-auto px-4 py-2 text-[11px]" style="color: var(--color-text-muted);"></div>

<main class="max-w-7xl mx-auto px-4 py-5 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3" id="grid"></main>

<footer class="max-w-7xl mx-auto px-4 py-8 mt-4 text-center text-[11px]" style="color: var(--color-text-muted); border-top: 1px solid var(--color-border);">
  VideoVault &mdash; Discover &amp; Stream
</footer>

<script>
// CORS Proxy for streaming media
const STREAM_PROXIES = [
  (url) => `https://videoproxy.moananayoob.workers.dev?url=${encodeURIComponent(url)}`,
  (url) => `https://universal.moananayoob.workers.dev?url=${encodeURIComponent(url)}`
];

async function fetchWithProxy(url) {
  let lastError = new Error("All proxies failed");
  for (let i = 0; i < STREAM_PROXIES.length; i++) {
    try {
      const res = await fetch(STREAM_PROXIES[i](url), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res;
    } catch (e) {
      lastError = e;
    }
  }
  throw lastError;
}

// Direct eporner API calls (handles via CORS proxy)
const EPORNER_API = 'https://www.eporner.com/api/v2';

// Proxy options - try in order
const PROXY_URLS = [
  'https://videoproxy.moananayoob.workers.dev', // Your deployed worker
  'https://cors-anywhere.herokuapp.com',         // Public CORS proxy
];

async function epornerAPI(endpoint, params = {}) {
  const url = new URL(`${EPORNER_API}${endpoint}`);
  url.searchParams.set('format', 'json');
  Object.entries(params).forEach(([key, value]) => {
    if (value !== undefined && value !== null) {
      url.searchParams.set(key, value);
    }
  });

  let lastError = null;

  for (const proxyUrl of PROXY_URLS) {
    try {
      const proxiedUrl = `${proxyUrl}?url=${encodeURIComponent(url.toString())}`;
      console.log('Fetching from:', proxyUrl);
      const res = await fetch(proxiedUrl, {
        signal: AbortSignal.timeout(10000),
        headers: {
          'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
        }
      });

      if (!res.ok) {
        lastError = new Error(`HTTP ${res.status} from ${proxyUrl}`);
        continue;
      }

      const data = await res.json();
      console.log('API Response:', data);
      return data;
    } catch (e) {
      console.warn(`Proxy failed (${proxyUrl}):`, e.message);
      lastError = e;
    }
  }

  throw lastError || new Error('All proxies failed');
}

let state = { keyword: "trending", items: [], activeCat: "Trending" };

function showSkeletons(count = 10) {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array(count).fill(0).map(() => `
    <div class="card rounded-2xl overflow-hidden">
      <div class="aspect-video skeleton"></div>
      <div class="p-3 space-y-2">
        <div class="skeleton h-3 w-full rounded"></div>
        <div class="skeleton h-3 w-2/3 rounded"></div>
      </div>
    </div>`).join('');
}

function setStatus(msg) {
  const bar = document.getElementById('statusBar');
  if (msg) { bar.textContent = msg; bar.classList.remove('hidden'); }
  else { bar.classList.add('hidden'); }
}

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (q) state.keyword = q;
  showSkeletons(10);
  setStatus('Searching...');
  state.items = [];

  try {
    console.log('Searching for:', state.keyword);
    const epData = await epornerAPI('/video/search/', {
      query: state.keyword,
      per_page: 30
    });

    console.log('Search results:', epData);

    if (!epData || !epData.videos) {
      throw new Error('Invalid API response: ' + JSON.stringify(epData));
    }

    state.items = (epData.videos || []).map(v => ({
      id: v.id,
      url: v.url || '',
      title: v.title,
      thumb: v.default_thumb?.src || v.default_thumb,
      duration: v.length_min ? `${v.length_min}m` : '',
      src: "EP",
      tags: v.keywords || ""
    }));

    console.log('Mapped items:', state.items);

    if (state.items.length === 0) {
      throw new Error('No videos found in response');
    }

    render(state.items);
    setStatus(`${state.items.length} results found`);
  } catch(e) {
    console.error('Search failed:', e.message, e);
    document.getElementById('grid').innerHTML = `
      <div class="col-span-full flex flex-col items-center py-24 gap-4">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p class="text-slate-500 text-sm">Search failed: ${e.message}</p>
      </div>`;
    setStatus('Error: ' + e.message);
  }
}

function render(items) {
  const grid = document.getElementById('grid');
  grid.innerHTML = "";
  items.forEach(v => {
    const card = document.createElement('div');
    card.className = "card rounded-2xl overflow-hidden";
    card.innerHTML = `
      <div class="aspect-video relative overflow-hidden" style="background: var(--color-muted);">
        <img src="${v.thumb}" alt="${escapeHtml(v.title)}" class="w-full h-full object-cover" loading="lazy" onerror="this.parentElement.style.background='#181818'">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 hover:opacity-100 transition-opacity duration-200 flex items-end p-2">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="white" opacity="0.9"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <span class="src-badge absolute top-2 left-2 uppercase">${v.src}</span>
        ${v.duration ? `<span class="src-badge absolute bottom-2 right-2">${v.duration}</span>` : ''}
      </div>
      <div class="p-3">
        <p class="text-[11px] font-semibold leading-tight line-clamp-2" style="min-height: 2.5em;">${escapeHtml(v.title)}</p>
      </div>`;
    
    card.onclick = () => {
      if (v.id) {
        location.href = `video.html?id=${v.id}`;
      } else if (v.url) {
        location.href = `video.html?url=${encodeURIComponent(v.url)}`;
      }
    };
    grid.appendChild(card);
  });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('actorSelect').onchange = (e) => {
  const val = e.target.value.toLowerCase();
  if (!val) { render(state.items); return; }
  render(state.items.filter(i => (i.title||'').toLowerCase().includes(val) || (i.tags||'').toLowerCase().includes(val)));
};

document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

const cats = ["Trending", "Asian", "Amateur", "Teen", "Milf", "POV", "Lesbian", "Solo"];
cats.forEach(c => {
  const b = document.createElement('button');
  b.className = "pill" + (c === state.activeCat ? " active" : "");
  b.textContent = c;
  b.onclick = () => {
    document.querySelectorAll('#catRow .pill').forEach(p => p.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('q').value = '';
    state.keyword = c.toLowerCase();
    state.activeCat = c;
    doSearch();
  };
  document.getElementById('catRow').appendChild(b);
});

doSearch();
</script>
</body>
</html>

```
