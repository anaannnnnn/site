<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library — VideoVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #000000;
      --color-card: #0c0c0d;
      --color-muted: #181818;
      --color-border: rgba(255,255,255,0.08);
      --color-accent: #e11d48;
      --color-accent-hover: #be123c;
      --color-text: #f8fafc;
      --color-text-muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body { background: var(--color-bg); color: var(--color-text); font-family: 'Inter', sans-serif; }
    .card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      transition: border-color 200ms ease, transform 200ms ease, box-shadow 200ms ease;
    }
    .card:hover {
      border-color: rgba(225,29,72,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(225,29,72,0.12);
    }
    .btn-play {
      background: var(--color-accent);
      transition: background 150ms;
    }
    .btn-play:hover { background: var(--color-accent-hover); }
    .btn-del {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      transition: background 150ms;
    }
    .btn-del:hover { background: rgba(239,68,68,0.2); }
    .btn-back {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--color-border);
      transition: background 150ms;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); }
    .logo-glow { text-shadow: 0 0 20px rgba(225,29,72,0.5); }
  </style>
</head>
<body>

<nav class="sticky top-0 z-50 border-b px-4 py-3" style="background: rgba(0,0,0,0.92); backdrop-filter: blur(16px); border-color: var(--color-border);">
  <div class="max-w-6xl mx-auto flex items-center justify-between">
    <a href="index.html" class="btn-back flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold text-white">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Browse
    </a>
    <div class="flex items-center gap-2">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-rose-500" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span class="text-sm font-bold logo-glow">VideoVault</span>
    </div>
    <div style="width: 80px;"></div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold">Your Library</h1>
      <p class="text-sm mt-1" style="color: var(--color-text-muted);">Saved videos for offline access</p>
    </div>
    <span id="countBadge" class="hidden px-3 py-1 rounded-full text-xs font-semibold" style="background: rgba(225,29,72,0.15); color: var(--color-accent); border: 1px solid rgba(225,29,72,0.25);"></span>
  </div>

  <div id="empty" class="hidden flex-col items-center justify-center py-32 gap-4">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    <p class="text-slate-500 text-sm">Your library is empty</p>
    <a href="index.html" class="px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wide text-white" style="background: var(--color-accent);">Browse Videos</a>
  </div>

  <main id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></main>
</div>

<script>
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function getDb() {
  return new Promise((res, rej) => {
    const req = indexedDB.open("VideoVault", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("downloads", { keyPath: "id" });
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}

async function init() {
  try {
    const db = await getDb();
    const tx = db.transaction("downloads", "readonly");
    const list = await new Promise(r => {
      const req = tx.objectStore("downloads").getAll();
      req.onsuccess = e => r(e.target.result);
    });

    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const badge = document.getElementById("countBadge");

    if (list.length === 0) {
      empty.classList.remove('hidden');
      empty.classList.add('flex');
      return;
    }

    badge.textContent = `${list.length} saved`;
    badge.classList.remove('hidden');

    list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)).forEach(v => {
      const d = document.createElement("div");
      d.className = "card rounded-2xl overflow-hidden cursor-pointer";
      d.onclick = (e) => {
        if (!e.target.closest('.btn-del')) location.href = `video.html?id=${v.id}`;
      };
      d.innerHTML = `
        <div class="aspect-video relative overflow-hidden" style="background: var(--color-muted);">
          <img src="${escapeHtml(v.thumb)}" alt="${escapeHtml(v.title)}" class="w-full h-full object-cover" loading="lazy">
          <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity duration-200" style="background: rgba(0,0,0,0.4);">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
        <div class="p-3">
          <h3 class="text-[11px] font-semibold leading-snug line-clamp-2" style="min-height: 2.5em;">${escapeHtml(v.title)}</h3>
          <div class="mt-3 flex gap-2">
            <button onclick="location.href='video.html?id=${v.id}'" class="btn-play flex-1 py-2 rounded-lg text-[10px] font-bold uppercase tracking-wide text-white flex items-center justify-center gap-1.5">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Play
            </button>
            <button onclick="del('${v.id}')" class="btn-del px-3 py-2 rounded-lg text-[10px] text-red-400 flex items-center justify-center" title="Remove">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </div>
        </div>`;
      grid.appendChild(d);
    });
  } catch(e) {
    document.getElementById('grid').innerHTML = `<p class="col-span-full text-center py-12 text-sm text-slate-500">Could not access library.</p>`;
  }
}

async function del(id) {
  try {
    const db = await getDb();
    await new Promise((res, rej) => {
      const req = db.transaction("downloads", "readwrite").objectStore("downloads").delete(id);
      req.onsuccess = res;
      req.onerror = rej;
    });
    location.reload();
  } catch(e) {
    alert("Failed to remove item.");
  }
}

init();
</script>
</body>
</html>
